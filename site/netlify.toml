[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# --- Hard-block compromised / WordPress paths (hack aftermath) ---
# Must stay ABOVE the SPA /* fallback so they are not soft-200 HTML.
[[redirects]]
  from = "/celana"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/celana/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-admin"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-admin/*"
