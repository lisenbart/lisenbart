[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/work"
  to = "/work/commercial/"
  status = 301

[[redirects]]
  from = "/work/commercial"
  to = "/work/commercial/"
  status = 301

[[redirects]]
  from = "/work/gaming"
  to = "/work/gaming/"
  status = 301

[[redirects]]
  from = "/work/film"
  to = "/work/film/"
  status = 301

[[redirects]]
  from = "/work/social"
  to = "/work/social/"
  status = 301

[[redirects]]
  from = "/work/commercial/index.html"
  to = "/work/commercial/"
  status = 301

[[redirects]]
  from = "/work/gaming/index.html"
  to = "/work/gaming/"
  status = 301

[[redirects]]
  from = "/work/film/index.html"
  to = "/work/film/"
  status = 301

[[redirects]]
  from = "/work/social/index.html"
  to = "/work/social/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
