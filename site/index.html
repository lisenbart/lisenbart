<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "LISENBART",
        "url": "https://www.lisenbart.com",
        "email": "info@lisenbart.com",
        "description": "From brief to screen — animation, film and AI content, produced end to end.",
        "founder": {
          "@type": "Person",
          "name": "Dmytro Lisenbart"
        },
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.lisenbart.com/images/logo_white.png"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "info@lisenbart.com",
          "contactType": "Business Inquiries"
        },
        "sameAs": [
          "https://www.linkedin.com/in/lisenbart/",
          "https://www.youtube.com/@lisenbartProduction",
          "https://www.facebook.com/dmytro.linsenbarth"
        ],
        "areaServed": ["Ukraine", "Worldwide"],
        "knowsAbout": ["Film Production", "Animation", "Game Content", "AI-assisted Production"]
      }
    </script>
    <script>
      (function () {
        var t = localStorage.getItem("lisenbart-theme");
        document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
      })();
    </script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        width: 100%;
        max-width: 100%;
      }
      #root {
        min-height: 100%;
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }
    </style>
  </head>
  <body>
    <!-- Netlify Forms: static hook for build-time detection (React submits via fetch) -->
    <form
      name="contact"
      method="POST"
      action="/"
      data-netlify="true"
      data-netlify-honeypot="website"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="email" name="email" />
      <input type="text" name="name" />
      <input type="text" name="projectType" />
      <textarea name="message"></textarea>
      <input type="text" name="website" />
    </form>
    <form
      name="testimonial-review"
      method="POST"
      action="/"
      data-netlify="true"
      data-netlify-honeypot="website"
      hidden
    >
      <input type="hidden" name="form-name" value="testimonial-review" />
      <input type="text" name="authorName" />
      <input type="text" name="company" />
      <textarea name="quote"></textarea>
      <input type="text" name="rating" />
      <textarea name="message"></textarea>
      <input type="text" name="website" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
