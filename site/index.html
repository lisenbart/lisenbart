<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LISENBART — General Producer for Film, Animation and AI Content</title>
    <meta
      name="description"
      content="General producer for film, animation and AI content. One lead, the right team, delivery end to end."
    />
    <link rel="canonical" href="https://www.lisenbart.com" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LISENBART — General Producer for Film, Animation and AI Content" />
    <meta
      property="og:description"
      content="General producer for film, animation and AI content. One lead, the right team, delivery end to end."
    />
    <meta property="og:url" content="https://www.lisenbart.com" />
    <meta property="og:image" content="%BASE_URL%images/header_01.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "LISENBART",
        "url": "https://www.lisenbart.com",
        "email": "info@lisenbart.com",
        "description": "General producer for film, animation and AI content — one lead, the right team, delivery end to end.",
        "areaServed": ["Ukraine", "Worldwide"],
        "knowsAbout": ["Film Production", "Animation", "Game Content", "AI-assisted Production"]
      }
    </script>
    <script>
      (function () {
        var t = localStorage.getItem("lisenbart-theme");
        document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
      })();
    </script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        width: 100%;
        max-width: 100%;
      }
      #root {
        min-height: 100%;
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }
    </style>
  </head>
  <body>
    <!-- Netlify Forms: static hook for build-time detection (React submits via fetch) -->
    <form
      name="contact"
      method="POST"
      action="/"
      data-netlify="true"
      data-netlify-honeypot="website"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="email" name="email" />
      <input type="text" name="name" />
      <input type="text" name="projectType" />
      <textarea name="message"></textarea>
      <input type="text" name="website" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
