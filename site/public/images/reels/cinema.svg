<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="1280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="40%" stop-color="#151525"/>
      <stop offset="70%" stop-color="#1a1028"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <radialGradient id="sky" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1F7AFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#030510" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
  <rect width="720" height="1280" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="200" rx="180" ry="60" fill="rgba(20,25,45,0.8)"/>
  <ellipse cx="520" cy="180" rx="200" ry="70" fill="rgba(15,20,40,0.7)"/>
  <ellipse cx="360" cy="250" rx="250" ry="50" fill="rgba(10,15,35,0.6)"/>
  <!-- City buildings -->
  <rect x="60" y="700" width="80" height="400" fill="rgba(8,12,25,0.9)" stroke="rgba(31,122,255,0.1)" stroke-width="1"/>
  <rect x="160" y="620" width="60" height="480" fill="rgba(10,14,28,0.85)"/>
  <rect x="240" y="680" width="90" height="420" fill="rgba(8,12,25,0.9)"/>
  <rect x="350" y="600" width="70" height="500" fill="rgba(10,14,28,0.85)"/>
  <rect x="440" y="650" width="100" height="450" fill="rgba(8,12,25,0.9)"/>
  <rect x="560" y="720" width="80" height="380" fill="rgba(10,14,28,0.85)"/>
  <!-- Building lights -->
  <rect x="75" y="750" width="8" height="8" fill="rgba(255,112,71,0.4)"/>
  <rect x="95" y="780" width="8" height="8" fill="rgba(66,217,255,0.3)"/>
  <rect x="370" y="650" width="8" height="8" fill="rgba(255,112,71,0.35)"/>
  <rect x="470" y="700" width="8" height="8" fill="rgba(66,217,255,0.25)"/>
  <!-- Figure silhouette -->
  <ellipse cx="360" cy="820" rx="35" ry="40" fill="rgba(5,8,18,0.95)"/>
  <rect x="330" y="855" width="60" height="120" rx="15" fill="rgba(5,8,18,0.95)"/>
  <rect x="310" y="960" width="25" height="80" rx="8" fill="rgba(5,8,18,0.9)"/>
  <rect x="405" y="960" width="25" height="80" rx="8" fill="rgba(5,8,18,0.9)"/>
  <!-- Ground reflection -->
  <ellipse cx="360" cy="1060" rx="200" ry="20" fill="rgba(31,122,255,0.08)"/>
  <!-- Rain/atmosphere lines -->
  <line x1="100" y1="400" x2="95" y2="450" stroke="rgba(100,120,180,0.15)" stroke-width="1"/>
  <line x1="300" y1="350" x2="295" y2="400" stroke="rgba(100,120,180,0.12)" stroke-width="1"/>
  <line x1="500" y1="380" x2="505" y2="430" stroke="rgba(100,120,180,0.15)" stroke-width="1"/>
</svg>
