<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="1280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0530"/>
      <stop offset="35%" stop-color="#3d0a5c"/>
      <stop offset="65%" stop-color="#6b1040"/>
      <stop offset="100%" stop-color="#2a0845"/>
    </linearGradient>
    <radialGradient id="arena" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#EF3DD2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7B42FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
  <rect width="720" height="1280" fill="url(#arena)"/>
  <!-- Arena floor -->
  <ellipse cx="360" cy="900" rx="320" ry="80" fill="rgba(239,61,210,0.15)"/>
  <!-- Character silhouette -->
  <ellipse cx="360" cy="420" rx="80" ry="90" fill="rgba(30,10,50,0.9)" stroke="rgba(239,61,210,0.3)" stroke-width="1"/>
  <rect x="300" y="500" width="120" height="200" rx="30" fill="rgba(30,10,50,0.85)" stroke="rgba(123,66,255,0.25)" stroke-width="1"/>
  <!-- Dice -->
  <rect x="160" y="600" width="60" height="60" rx="10" fill="rgba(20,5,40,0.9)" stroke="#EF3DD2" stroke-width="1.5" transform="rotate(-15 190 630)"/>
  <rect x="500" y="550" width="55" height="55" rx="10" fill="rgba(20,5,40,0.9)" stroke="#7B42FF" stroke-width="1.5" transform="rotate(20 527 577)"/>
  <!-- Chips -->
  <ellipse cx="200" cy="780" rx="40" ry="12" fill="rgba(239,61,210,0.5)"/>
  <ellipse cx="520" cy="720" rx="35" ry="10" fill="rgba(123,66,255,0.5)"/>
  <text x="360" y="680" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="system-ui,sans-serif" font-size="28" font-weight="300" letter-spacing="6">BIG WIN</text>
  <!-- Neon particles -->
  <circle cx="150" cy="350" r="3" fill="#EF3DD2" opacity="0.6"/>
  <circle cx="570" cy="380" r="4" fill="#FF7047" opacity="0.5"/>
  <circle cx="360" cy="280" r="2" fill="#42D9FF" opacity="0.5"/>
</svg>
